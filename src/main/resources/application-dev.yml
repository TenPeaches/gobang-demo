spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 支持用环境变量覆盖（不设置则使用默认值），方便不同电脑/服务器部署
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gobang_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

